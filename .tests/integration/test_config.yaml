# Integration test configuration
input: ".tests/integration/test_input.tsv"
publish_dir: ".tests/integration/results"

default_container: "docker://hydragenetics/common:3.1.1"

# Remove reference genome requirement for testing
# reference_genome: ""

# Reduced resource requirements for testing
resources:
  vcf_validation:
    mem_mb: 1000
    runtime: 10
    cpus_per_task: 1
  
  bam_validation:
    mem_mb: 1000
    runtime: 10
    cpus_per_task: 1
  
  metrics_validation:
    mem_mb: 500
    runtime: 5
    cpus_per_task: 1
  
  misc_validation:
    mem_mb: 500
    runtime: 5
    cpus_per_task: 1
  
  summary_tasks:
    mem_mb: 500
    runtime: 5
    cpus_per_task: 1