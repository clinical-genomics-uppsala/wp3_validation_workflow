# Snakemake workflow configuration

publish_dir: "validation_results"

default_container: "docker://hydragenetics/common:3.1.1"


reference_genome: ""

# Rule-specific resource requirements
resources:
  # VCF file processing (larger files may need more resources)
  vcf_validation:
    mem_mb: 8000
    runtime: 240
    cpus_per_task: 1
  
  # BAM/CRAM file processing
  bam_validation:
    mem_mb: 6000
    runtime: 240
    cpus_per_task: 1
  
  # Metrics file processing 
  metrics_validation:
    mem_mb: 6000
    runtime: 240
    cpus_per_task: 1
  
  # Miscellaneous file processing
  misc_validation:
    mem_mb: 6000
    runtime: 240
    cpus_per_task: 1
  
  # Summary and collection tasks 
  summary_tasks:
    mem_mb: 6000
    runtime: 240
    cpus_per_task: 1

  # Happy benchmarking tasks
  happy_benchmarking:
    mem_mb: 20000
    runtime: 720
    cpus_per_task: 16

