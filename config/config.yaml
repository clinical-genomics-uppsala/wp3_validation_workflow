# Snakemake workflow configuration

publish_dir: "validation_results"

default_container: "docker://hydragenetics/common:3.1.1"

resources_file: "config/resources.yaml"

# Path to the reference genome FASTA (override in pipeline-specific config)
# reference_genome: "/path/to/GRCh38.fasta"

# Suffix for the VCF file to be used in happy benchmarking
happy_vcf_suffix: "snv_indels.vcf.gz"
truvari_vcf_suffix: "svdb_merged.vcf.gz"


happy_benchmarking:
  container: "docker://hydragenetics/hap.py:0.3.15"

truvari_benchmarking:
  container: "docker://quay.io/biocontainers/truvari:5.3.0--pyhdfd78af_0"

benchmarking_report:
  container: "docker://hydragenetics/quarto:1.8.27"

render_benchmarking_report:
  notebook: "/projects/wp3/Validering/pipelines/wp3_validation_workflow/workflow/notebooks/benchmarking_report.ipynb"

resources:
  # VCF file processing (larger files may need more resources)
  vcf_validation:
    mem_mb: 8000
    runtime: 240
    cpus_per_task: 1
  
  # BAM/CRAM file processing
  bam_validation:
    mem_mb: 6000
    runtime: 240
    cpus_per_task: 1
  
  # Metrics file processing 
  metrics_validation:
    mem_mb: 6000
    runtime: 240
    cpus_per_task: 1
  
  # Miscellaneous file processing
  misc_validation:
    mem_mb: 6000
    runtime: 240
    cpus_per_task: 1

  render_benchmarking_report:
    notebook: "/projects/wp3/Validering/pipelines/wp3_validation_workflow/workflow/notebooks/benchmarking_report.ipynb"  
  
  # Summary and collection tasks 
  summary_tasks:
    mem_mb: 6000
    runtime: 240
    cpus_per_task: 1

  # Happy benchmarking tasks
  happy_benchmarking:
    mem_mb: 20000
    runtime: 720
    cpus_per_task: 16

  # Truvari benchmarking tasks
  truvari_benchmarking:
    mem_mb: 96000
    runtime: 240
    cpus_per_task: 16

